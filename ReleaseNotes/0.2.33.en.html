<style class="qm-release-style">
.qm-release-page {
  --release-ink: var(--qm-text, #1d1d1f);
  --release-muted: var(--qm-secondary, #6e6e73);
  --release-accent: var(--qm-accent, #007aff);
  --release-border: color-mix(in srgb, var(--release-accent), transparent 78%);
  --release-panel: color-mix(in srgb, Canvas, var(--release-accent) 5%);
  --release-panel-strong: color-mix(in srgb, Canvas, white 22%);
  --release-green: #2fbf71;
  --release-amber: #d39b20;
  --release-coral: #e26d5a;
  position: relative;
  overflow: hidden;
  color: var(--release-ink);
  padding: 2px;
}
.qm-release-page::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 84px;
  pointer-events: none;
  background:
    linear-gradient(90deg,
      color-mix(in srgb, var(--release-accent), transparent 78%),
      color-mix(in srgb, var(--release-green), transparent 82%),
      transparent);
  opacity: 0.7;
  transform: translateY(-52px) skewY(-8deg);
}
.qm-release-hero,
.qm-release-highlight {
  position: relative;
  border: 1px solid var(--release-border);
  border-radius: 8px;
  background: color-mix(in srgb, var(--release-panel), transparent 8%);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
  overflow: hidden;
}
.qm-release-hero {
  padding: 10px 12px 9px;
  margin-bottom: 8px;
  background:
    linear-gradient(135deg,
      color-mix(in srgb, var(--release-accent), transparent 82%),
      color-mix(in srgb, var(--release-green), transparent 88%) 46%,
      color-mix(in srgb, var(--release-amber), transparent 90%)),
    var(--release-panel-strong);
}
.qm-release-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 0 36%,
    rgba(255, 255, 255, 0.32) 48%,
    transparent 61% 100%);
  transform: translateX(-120%);
  animation: qm-release-sheen 3.8s ease-in-out infinite;
}
.qm-release-hero-content {
  position: relative;
  z-index: 1;
}
.qm-release-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 0 0 5px;
  color: var(--release-accent);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}
.qm-release-eyebrow::before {
  content: "";
  width: 18px;
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--release-accent), var(--release-green));
}
.qm-release-title {
  margin: 0;
  font-size: 17px;
  line-height: 1.15;
  letter-spacing: 0;
}
.qm-release-subtitle {
  max-width: 34em;
  margin: 5px 0 0;
  color: var(--release-muted);
  font-size: 11.5px;
  line-height: 1.4;
}
.qm-release-demo {
  position: relative;
  margin: 0 0 8px;
  padding: 8px;
  border: 1px solid var(--release-border);
  border-radius: 8px;
  background: color-mix(in srgb, Canvas, var(--release-accent) 4%);
  box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
}
.qm-release-demo figcaption {
  margin: 0 0 6px;
  color: var(--release-ink);
  font-size: 11.5px;
  font-weight: 700;
}
.qm-release-demo-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
}
.qm-release-demo-panel {
  min-width: 0;
  padding: 6px;
  border-radius: 7px;
  background: rgba(255, 255, 255, 0.48);
}
.qm-release-demo-panel.after {
  background: color-mix(in srgb, var(--release-green), transparent 86%);
}
.qm-release-demo-label {
  display: block;
  margin-bottom: 5px;
  color: var(--release-muted);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
}
.qm-release-demo-row {
  display: grid;
  gap: 2px;
  min-height: 35px;
  padding: 6px;
  border-radius: 6px;
  background: color-mix(in srgb, Canvas, transparent 12%);
}
.qm-release-demo-row + .qm-release-demo-row { margin-top: 4px; }
.qm-release-demo-row strong {
  overflow: hidden;
  color: var(--release-ink);
  font-size: 10.5px;
  line-height: 1.2;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.qm-release-demo-row span {
  overflow: hidden;
  color: var(--release-muted);
  font-size: 9px;
  line-height: 1.25;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.qm-release-rhythm {
  display: grid;
  grid-template-columns: 1.4fr 0.8fr 1.1fr 0.55fr;
  gap: 4px;
  margin-top: 8px;
  max-width: 210px;
}
.qm-release-rhythm span {
  height: 3px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--release-accent), transparent 25%);
  animation: qm-release-pulse 1.8s ease-in-out infinite;
  animation-delay: calc(var(--i) * 120ms);
}
.qm-release-rhythm span:nth-child(2) { background: var(--release-green); }
.qm-release-rhythm span:nth-child(3) { background: var(--release-amber); }
.qm-release-rhythm span:nth-child(4) { background: var(--release-coral); }
.qm-release-highlights {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 7px;
}
.qm-release-highlight {
  min-height: 70px;
  padding: 8px 9px;
}
.qm-release-highlight::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--tone), transparent);
}
.qm-release-highlight:nth-child(4n+1) { --tone: var(--release-accent); }
.qm-release-highlight:nth-child(4n+2) { --tone: var(--release-green); }
.qm-release-highlight:nth-child(4n+3) { --tone: var(--release-amber); }
.qm-release-highlight:nth-child(4n) { --tone: var(--release-coral); }
.qm-release-number {
  display: inline-grid;
  place-items: center;
  width: 22px;
  height: 22px;
  margin-bottom: 5px;
  border-radius: 7px;
  color: white;
  background: var(--tone);
  font-size: 10.5px;
  font-weight: 700;
}
.qm-release-highlight p {
  margin: 0;
  color: var(--release-ink);
  font-size: 11.5px;
  line-height: 1.38;
}
.release-animate {
  opacity: 0;
  transform: translateY(10px);
  animation: qm-release-enter 520ms cubic-bezier(.2, .8, .2, 1) forwards;
  animation-delay: calc(var(--i) * 80ms);
}
@keyframes qm-release-enter {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes qm-release-sheen {
  0%, 55% { transform: translateX(-120%); }
  100% { transform: translateX(120%); }
}
@keyframes qm-release-pulse {
  0%, 100% { transform: scaleX(0.72); opacity: 0.55; }
  45% { transform: scaleX(1); opacity: 1; }
}
@media (prefers-color-scheme: dark) {
  .qm-release-page {
    --release-panel: rgba(34, 34, 38, 0.74);
    --release-panel-strong: rgba(45, 45, 51, 0.86);
  }
  .qm-release-demo-panel {
    background: rgba(255, 255, 255, 0.06);
  }
  .qm-release-demo-panel.after {
    background: color-mix(in srgb, var(--release-green), transparent 88%);
  }
  .qm-release-hero,
  .qm-release-highlight {
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
  }
}
@media (prefers-reduced-motion: reduce) {
  .qm-release-hero::after,
  .qm-release-rhythm span,
  .release-animate {
    animation: none;
    opacity: 1;
    transform: none;
  }
}
</style>
<section class="qm-release-page" aria-label="Release highlights">
<div class="qm-release-hero release-animate" style="--i:0">
<div class="qm-release-hero-content">
<p class="qm-release-eyebrow">Release highlights</p>
<h2 class="qm-release-title">QuotaMonitor 0.2.33</h2>
<p class="qm-release-subtitle">This update focuses on daily visibility, long-running performance, and clearer session lists.</p>
<div class="qm-release-rhythm" aria-hidden="true">
<span style="--i:0"></span><span style="--i:1"></span><span style="--i:2"></span><span style="--i:3"></span>
</div>
</div>
</div>
<figure class="qm-release-demo release-animate" style="--i:1" aria-label="Session title before and after preview">
<figcaption>Session rows now separate title from project</figcaption>
<div class="qm-release-demo-grid">
<div class="qm-release-demo-panel">
<span class="qm-release-demo-label">Before</span>
<div class="qm-release-demo-row"><strong>quota-monitor</strong><span>Project name shown as the title</span></div>
<div class="qm-release-demo-row"><strong>Untitled session</strong><span>No project fallback in the title slot</span></div>
</div>
<div class="qm-release-demo-panel after">
<span class="qm-release-demo-label">After</span>
<div class="qm-release-demo-row"><strong>Split session titles from project metadata</strong><span>Project: quota-monitor</span></div>
<div class="qm-release-demo-row"><strong>project-name-fallback-demo</strong><span>Fallback only when no title exists</span></div>
</div>
</div>
</figure>
<div class="qm-release-highlights">
<article class="qm-release-highlight release-animate" style="--i:2">
<span class="qm-release-number">1</span>
<p>Today's usage and spend appear immediately on the dashboard</p>
</article>
<article class="qm-release-highlight release-animate" style="--i:3">
<span class="qm-release-number">2</span>
<p>Performance improvements</p>
</article>
<article class="qm-release-highlight release-animate" style="--i:4">
<span class="qm-release-number">3</span>
<p>Known bug fixes</p>
</article>
<article class="qm-release-highlight release-animate" style="--i:5">
<span class="qm-release-number">4</span>
<p>Updated app icon</p>
</article>
</div>
</section>
