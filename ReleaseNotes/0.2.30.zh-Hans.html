<div class="release-details">
<h3>新增</h3>
<ul>
<li><b>Dashboard 和 Settings 互相跳转入口。</b> Dashboard 右上角现在提供 Settings 快捷入口，Settings 右上角也提供 Dashboard 快捷入口，用户无需回到菜单栏即可在两个窗口之间切换。</li>
<li><b>新导航图标的快速悬浮提示。</b> 这些工具栏快捷入口使用比系统默认 tooltip 更短的悬浮延迟，让纯图标操作更容易被理解。</li>
</ul>
