# Triggered on `v*` tag push. Builds, publishes, and feeds Sparkle for
# BOTH brands from the same source: Quota Monitor (this repo) and
# CodexMonitor (the codex-monitor repo). A shared `test` job gates both
# brand jobs, which then run in parallel.
#
# Each brand job runs the full pipeline (tools/release.sh: tests →
# release build → Developer ID app + DMG notarization → sha256 →
# mount-verify), signs that final DMG with the Sparkle Ed25519 key, verifies
# signing did not change its bytes, uploads that exact path to a GitHub
# Release, and lands the signed <item> in that brand's feed.
#
# Why sign in CI (not locally): the signature must be computed over the
# byte-for-byte DMG users download. The old local-sign flow signed a
# differently-built DMG and Sparkle rejected every update as "improperly
# signed" — that is how 0.2.26/0.2.27 broke.
#
# How each brand's feed is updated:
#   - Quota Monitor — this repo's main is branch-protected, so CI can't
#     push the entry; it opens an appcast PR for the maintainer to merge
#     (the human gate before every running client sees the update).
#   - CodexMonitor — the codex-monitor repo's main is NOT protected, so
#     the signed entry is pushed straight to its appcast.xml. The feed is
#     correct by construction (signed over the exact published DMG), and
#     this needs only contents:write on the PAT — no PR-create scope.
#
# Failure handling: deliberately no automatic cleanup. Once a GitHub Release
# exists, assets have been uploaded, or Appcast publication has started, do
# not only re-run the job or delete only the tag. Inspect and complete the same
# Release and Appcast using docs/release.md. Only when a full republish is
# required, delete both the GitHub Release and tag, then recreate them.
#
# Secret setup (one-time):
#   DEVELOPER_ID_CERTIFICATE_BASE64 — base64-encoded .p12 export containing
#     the Developer ID Application cert and private key.
#   DEVELOPER_ID_CERTIFICATE_PASSWORD — password for that .p12 export.
#   DEVELOPER_ID_APPLICATION — optional exact identity name, e.g.
#     "Developer ID Application: Your Name (TEAMID)".
#   APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD — notarytool
#     credentials used by CI.
#   SPARKLE_PRIVATE_KEY — base64 Ed25519 seed (`generate_keys -x`). Signs
#     both brands' DMGs; its public half is SUPublicEDKey in Info.plist,
#     so the same key is valid for CodexMonitor too.
#   CODEX_MONITOR_PAT — token with contents:write on timmyagentic/
#     codex-monitor. Lets this workflow publish the CodexMonitor release
#     and push its appcast entry into that repo.

name: release

on:
  push:
    tags: ['v*']

# Keep the built-in token read-only unless a job writes this repository.
permissions:
  contents: read

# Don't cancel an in-flight release for the same tag — releases write
# external state (GitHub Release, uploaded assets), cancelling mid-flight
# could leave the release half-published.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── shared gate: tests must pass before any DMG is built ──────────
  test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Validate required release secrets
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          CODEX_MONITOR_PAT: ${{ secrets.CODEX_MONITOR_PAT }}
        run: |
          required=(
            DEVELOPER_ID_CERTIFICATE_BASE64
            DEVELOPER_ID_CERTIFICATE_PASSWORD
            APPLE_ID
            APPLE_TEAM_ID
            APPLE_APP_SPECIFIC_PASSWORD
            SPARKLE_PRIVATE_KEY
            CODEX_MONITOR_PAT
          )
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::required release secret ${name} is missing"
              missing=1
            fi
          done
          exit "${missing}"

      - uses: actions/checkout@v6.0.2
        with:
          # CHANGELOG.md is committed so depth=1 would suffice, but full
          # history costs little on a single-job workflow and keeps `git`
          # invocations inside release.sh well-behaved.
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Verify tag matches Resources/VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          echo "tag:  ${TAG_VERSION}"
          echo "file: ${FILE_VERSION}"
          if [[ "${TAG_VERSION}" != "${FILE_VERSION}" ]]; then
            echo "::error::tag '${GITHUB_REF_NAME}' does not match Resources/VERSION '${FILE_VERSION}'"
            exit 1
          fi

      - name: Validate release notes
        # Runs in the shared gate so BOTH brand jobs are blocked when the
        # changelogs are missing or malformed for this version.
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          python3 tools/validate-release-notes.py "${VERSION}" CHANGELOG.md CHANGELOG.zh-Hans.md

      - name: Run tooling tests
        run: python3 -m unittest discover tools/tests

      - name: Verify production version statistics service
        run: python3 tools/check-version-statistics-service.py

      - name: Run tests
        run: swift test --disable-keychain

  # ── Quota Monitor (this repo) ─────────────────────────────────────
  release-quota-monitor:
    needs: test
    # This job creates this repo's Release, pushes the Appcast branch, and
    # opens its PR, so only this job receives built-in-token write access.
    permissions:
      contents: write
      pull-requests: write
    runs-on: macos-15
    # Two sequential notary submissions can each wait up to NOTARYTOOL_TIMEOUT.
    # Leave enough room for app + DMG notarization plus build/upload/appcast work.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Full history keeps `git` invocations inside release.sh and the
          # appcast PR step well-behaved.
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          if [[ -z "${DEVELOPER_ID_CERTIFICATE_BASE64}" || -z "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" ]]; then
            echo "::error::Developer ID certificate secrets are missing. Configure DEVELOPER_ID_CERTIFICATE_BASE64 and DEVELOPER_ID_CERTIFICATE_PASSWORD."
            exit 1
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/developer-id-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"

          printf '%s' "${DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 -D > "${CERT_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"
          if [[ -n "${DEVELOPER_ID_APPLICATION}" ]] && \
             ! security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | grep -Fq "${DEVELOPER_ID_APPLICATION}"; then
            echo "::error::DEVELOPER_ID_APPLICATION does not match an imported identity."
            exit 1
          fi

      - name: Run release pipeline
        # tests + release build + DMG + sha256 + mount-verify self-check.
        env:
          QM_RELEASE_SIGNING: developer-id
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARYTOOL_TIMEOUT: 2h
        run: ./tools/release.sh

      - name: Extract CHANGELOG section for this release
        # Slice the `## [X.Y.Z] — YYYY-MM-DD` block out of CHANGELOG.md
        # to feed `gh release create --notes-file`. This step now fails if
        # the section is missing; releases must ship clear user-facing notes.
        id: notes
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          NOTES_FILE="$(mktemp -t release-notes)"
          awk -v hdr="## [${VERSION}] " '
            substr($0, 1, length(hdr)) == hdr { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "${NOTES_FILE}"
          if [[ ! -s "${NOTES_FILE}" ]]; then
            echo "::error::no CHANGELOG section found for ${VERSION}"
            exit 1
          fi
          echo "path=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"
          echo "---- release notes ----"
          cat "${NOTES_FILE}"
          echo "-----------------------"

      - name: Sign release DMG + build appcast entry
        # Validate and sign the final notarized DMG before publication. The
        # signature command must not change the bytes described by the sidecar.
        id: appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          DMG="dist/QuotaMonitor-${VERSION}.dmg"
          SHA="${DMG}.sha256"
          if [[ ! -f "${DMG}" ]]; then
            echo "::error::release DMG ${DMG} is missing"
            exit 1
          fi
          if [[ ! -f "${SHA}" ]]; then
            echo "::error::release checksum ${SHA} is missing"
            exit 1
          fi
          EXPECTED_SHA="$(awk '{print $1}' "${SHA}")"
          PRE_SIGN_SHA="$(shasum -a 256 "${DMG}" | awk '{print $1}')"
          if [[ -z "${EXPECTED_SHA}" || "${EXPECTED_SHA}" != "${PRE_SIGN_SHA}" ]]; then
            echo "::error::${SHA} does not match ${DMG} before Sparkle signing"
            exit 1
          fi
          ./tools/verify-signing-key.sh
          ./tools/release-sparkle.sh "${DMG}"
          POST_SIGN_SHA="$(shasum -a 256 "${DMG}" | awk '{print $1}')"
          if [[ "${PRE_SIGN_SHA}" != "${POST_SIGN_SHA}" ]]; then
            echo "::error::Sparkle signing changed ${DMG}"
            exit 1
          fi
          {
            echo "### Appcast entry for ${VERSION}"
            echo '```xml'
            cat "dist/appcast-item-${VERSION}.xml"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "dmg=${DMG}" >> "${GITHUB_OUTPUT}"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.appcast.outputs.dmg }}" \
            "${{ steps.appcast.outputs.sha }}" \
            --title "QuotaMonitor ${VERSION}" \
            --notes-file "${{ steps.notes.outputs.path }}"

      - name: Open appcast PR
        # The feed is served from main (raw.githubusercontent.com/.../main
        # /appcast.xml) and main is branch-protected, so CI can't push the
        # entry directly — it opens a PR for the maintainer to merge.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          ITEM_FILE="dist/appcast-item-${VERSION}.xml"   # gitignored; survives the branch switch
          BRANCH="appcast/v${VERSION}"
          git fetch origin main
          git switch -c "${BRANCH}" origin/main
          python3 tools/appcast-insert.py "${ITEM_FILE}" appcast.xml
          if git diff --quiet -- appcast.xml; then
            echo "appcast.xml already up to date for ${VERSION}; no PR needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Commit the linked release notes too: the appcast now references
          # them via sparkle:releaseNotesLink instead of inlining, so the
          # feed only works once these files are on main. release-sparkle.sh
          # wrote any missing ones (changelog fallback); hand-authored files
          # already tracked on main stage as no-ops.
          git add appcast.xml \
            "ReleaseNotes/${VERSION}.en.html" "ReleaseNotes/${VERSION}.zh-Hans.html"
          git commit -m "appcast: v${VERSION}"
          git push -u origin "${BRANCH}"
          gh pr create --base main --head "${BRANCH}" \
            --title "appcast: v${VERSION}" \
            --body "Auto-generated by \`release.yml\`. The \`sparkle:edSignature\` was computed over the exact DMG published to the **v${VERSION}** release, so it matches the bytes Sparkle downloads. Release notes are linked (\`sparkle:releaseNotesLink\`) to the committed \`ReleaseNotes/${VERSION}.*.html\` so the feed stays small. Merge to let every running client see v${VERSION} on its next check."

  # ── CodexMonitor (codex-monitor repo) ─────────────────────────────
  release-codex-monitor:
    needs: test
    # External publication uses CODEX_MONITOR_PAT; the built-in token only
    # needs to read this source repository.
    permissions:
      contents: read
    runs-on: macos-15
    # Two sequential notary submissions can each wait up to NOTARYTOOL_TIMEOUT.
    # Leave enough room for app + DMG notarization plus build/upload/appcast work.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v6.0.2
        with: { fetch-depth: 0 }

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          if [[ -z "${DEVELOPER_ID_CERTIFICATE_BASE64}" || -z "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" ]]; then
            echo "::error::Developer ID certificate secrets are missing. Configure DEVELOPER_ID_CERTIFICATE_BASE64 and DEVELOPER_ID_CERTIFICATE_PASSWORD."
            exit 1
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/developer-id-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"

          printf '%s' "${DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 -D > "${CERT_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"
          if [[ -n "${DEVELOPER_ID_APPLICATION}" ]] && \
             ! security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | grep -Fq "${DEVELOPER_ID_APPLICATION}"; then
            echo "::error::DEVELOPER_ID_APPLICATION does not match an imported identity."
            exit 1
          fi

      - name: Switch branding to CodexMonitor
        run: |
          sed -i '' 's/appDisplayName = ".*"/appDisplayName = "CodexMonitor"/' \
            QuotaMonitor/Core/Branding.swift
          sed -i '' 's/appCodeName = ".*"/appCodeName = "CodexMonitor"/' \
            QuotaMonitor/Core/Branding.swift
          # Repoint the built-in feed to the legacy raw URL existing CodexMonitor
          # installs already use. Release/API operations below use the canonical
          # timmyagentic/codex-monitor repository; this installed-client URL stays
          # stable independently of the repository's current owner.
          # (build.sh copies Resources/Info.plist verbatim apart from version
          # and brand-name injection, so editing it here flows into the build.)
          sed -i '' \
            's#https://raw.githubusercontent.com/timmyagentic/quota-monitor/main/appcast.xml#https://raw.githubusercontent.com/systemoutprintlnnnn/codex-monitor/main/appcast.xml#' \
            Resources/Info.plist
          echo "==> Branding after switch:"
          grep -E 'app(DisplayName|CodeName)' QuotaMonitor/Core/Branding.swift
          echo "==> Sparkle feed after switch:"
          grep -A1 SUFeedURL Resources/Info.plist

      - name: Run release pipeline
        env:
          QM_RELEASE_SIGNING: developer-id
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARYTOOL_TIMEOUT: 2h
        run: ./tools/release.sh

      - name: Extract CHANGELOG section for this release
        # Same strictness as the Quota Monitor job: a missing section
        # fails the release instead of shipping a stub.
        id: notes
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          NOTES_FILE="$(mktemp -t release-notes)"
          awk -v hdr="## [${VERSION}] " '
            substr($0, 1, length(hdr)) == hdr { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "${NOTES_FILE}"
          if [[ ! -s "${NOTES_FILE}" ]]; then
            echo "::error::no CHANGELOG section found for ${VERSION}"
            exit 1
          fi
          echo "path=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Sign release DMG + build appcast entry
        id: appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          DMG="dist/CodexMonitor-${VERSION}.dmg"
          SHA="${DMG}.sha256"
          if [[ ! -f "${DMG}" ]]; then
            echo "::error::release DMG ${DMG} is missing"
            exit 1
          fi
          if [[ ! -f "${SHA}" ]]; then
            echo "::error::release checksum ${SHA} is missing"
            exit 1
          fi
          EXPECTED_SHA="$(awk '{print $1}' "${SHA}")"
          PRE_SIGN_SHA="$(shasum -a 256 "${DMG}" | awk '{print $1}')"
          if [[ -z "${EXPECTED_SHA}" || "${EXPECTED_SHA}" != "${PRE_SIGN_SHA}" ]]; then
            echo "::error::${SHA} does not match ${DMG} before Sparkle signing"
            exit 1
          fi
          # SUPublicEDKey is unchanged by the brand switch, so the same key
          # guard applies to the CodexMonitor build.
          ./tools/verify-signing-key.sh
          RELEASE_REPO="timmyagentic/codex-monitor" \
          NOTES_BASE_URL="https://raw.githubusercontent.com/timmyagentic/codex-monitor/main" \
            ./tools/release-sparkle.sh "${DMG}"
          POST_SIGN_SHA="$(shasum -a 256 "${DMG}" | awk '{print $1}')"
          if [[ "${PRE_SIGN_SHA}" != "${POST_SIGN_SHA}" ]]; then
            echo "::error::Sparkle signing changed ${DMG}"
            exit 1
          fi
          {
            echo "### CodexMonitor appcast entry for ${VERSION}"
            echo '```xml'
            cat "dist/appcast-item-${VERSION}.xml"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "dmg=${DMG}" >> "${GITHUB_OUTPUT}"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release on codex-monitor repo
        env:
          GH_TOKEN: ${{ secrets.CODEX_MONITOR_PAT }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.appcast.outputs.dmg }}" \
            "${{ steps.appcast.outputs.sha }}" \
            --repo timmyagentic/codex-monitor \
            --title "CodexMonitor ${VERSION}" \
            --notes-file "${{ steps.notes.outputs.path }}"

      - name: Publish appcast entry to codex-monitor
        # codex-monitor's main is unprotected, so the signed entry is
        # pushed straight to its feed (no PR gate). The signature was
        # computed over the exact published DMG, so the feed is correct by
        # construction. appcast-insert.py is idempotent and synthesizes a
        # minimal feed when codex-monitor has no appcast.xml yet, so re-runs
        # and first releases (even into a bare repo) are both safe.
        env:
          GH_TOKEN: ${{ secrets.CODEX_MONITOR_PAT }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          ITEM_FILE="$(pwd)/dist/appcast-item-${VERSION}.xml"   # gitignored; absolute so it survives the cd
          WORK="$(mktemp -d)"
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/timmyagentic/codex-monitor.git" \
            "${WORK}"
          python3 tools/appcast-insert.py "${ITEM_FILE}" "${WORK}/appcast.xml"
          # Ship the linked release notes into codex-monitor too, so its feed is
          # self-contained: its sparkle:releaseNotesLink points at
          # codex-monitor/main/ReleaseNotes/, which only resolves once these
          # files are on codex-monitor's main. release-sparkle.sh wrote them
          # into ReleaseNotes/ in this checkout earlier in the job.
          mkdir -p "${WORK}/ReleaseNotes"
          cp "ReleaseNotes/${VERSION}.en.html" "ReleaseNotes/${VERSION}.zh-Hans.html" \
            "${WORK}/ReleaseNotes/"
          # Stage first so freshly-synthesized (previously untracked) files are
          # detected and committed — `git diff` and `commit -am` both ignore
          # untracked files, which would silently drop a first release into a
          # bare repo.
          git -C "${WORK}" add appcast.xml \
            "ReleaseNotes/${VERSION}.en.html" "ReleaseNotes/${VERSION}.zh-Hans.html"
          if git -C "${WORK}" diff --cached --quiet; then
            echo "codex-monitor already has ${VERSION}; nothing to push"
            exit 0
          fi
          git -C "${WORK}" config user.name "github-actions[bot]"
          git -C "${WORK}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${WORK}" commit -m "appcast: v${VERSION}"
          git -C "${WORK}" push origin HEAD:main
