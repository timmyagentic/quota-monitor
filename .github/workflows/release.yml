# Triggered on `v*` tag push. Runs tools/release.sh end-to-end on a
# macos-15 runner and publishes a GitHub Release with the DMG + sha256
# attached. A parallel job rebuilds with CodexMonitor branding and
# publishes to the codex-monitor repo.
#
# Why this exists: tools/release.sh has always run the full pipeline
# locally (tests → release build → DMG → mount-verify) but the final
# `gh release create` was a hand-typed step. tests.yml runs on tag push
# too, but only does `swift test` — no DMG, no release. This workflow
# closes the gap so `git push origin v0.2.10` produces a published
# release on its own.
#
# Dual-brand releases: the same source code produces two branded DMGs
# — one under "Quota Monitor" (this repo), one under "CodexMonitor"
# (the codex-monitor repo). Both run in parallel after tests pass.
#
# Failure handling: deliberately no auto-tag-deletion. If anything fails
# the tag stays put so the developer can investigate, then either re-run
# the failed job from the Actions UI, or delete + recut the tag manually
# (git tag -d vX.Y.Z && git push origin :refs/tags/vX.Y.Z).
#
# Secret setup (one-time):
#   CODEX_MONITOR_PAT — a Personal Access Token with `repo` and
#   `workflow` scopes, created by the codex-monitor repo owner.
#   Store it in this repo's Settings → Secrets and variables → Actions.

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write        # `gh release create` + push the appcast branch
  pull-requests: write   # open the appcast PR back to main

# Don't cancel an in-flight release for the same tag — releases write
# external state (GitHub Release, uploaded assets), cancelling mid-flight
# could leave the release half-published.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── shared gate: tests must pass before any DMG is built ──────────
  test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify tag matches Resources/VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          echo "tag:  ${TAG_VERSION}"
          echo "file: ${FILE_VERSION}"
          if [[ "${TAG_VERSION}" != "${FILE_VERSION}" ]]; then
            echo "::error::tag '${GITHUB_REF_NAME}' does not match Resources/VERSION '${FILE_VERSION}'"
            exit 1
          fi
      - name: Run tests
        run: swift test --disable-keychain

  # ── Quota Monitor (this repo) ─────────────────────────────────────
  release-quota-monitor:
    needs: test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # CHANGELOG.md is committed so depth=1 would suffice, but full
          # history costs little on a single-job workflow and keeps `git`
          # invocations inside release.sh well-behaved.
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Run release pipeline
        # tests + release build + DMG + sha256 + mount-verify self-check.
        run: ./tools/release.sh

      - name: Extract CHANGELOG section for this release
        # Slice the `## [X.Y.Z] — YYYY-MM-DD` block out of CHANGELOG.md
        # to feed `gh release create --notes-file`. Falls back to a stub
        # if the section is missing — we don't want a forgotten changelog
        # entry to block the release upload.
        id: notes
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          NOTES_FILE="$(mktemp -t release-notes)"
          awk -v hdr="## [${VERSION}] " '
            substr($0, 1, length(hdr)) == hdr { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "${NOTES_FILE}"
          if [[ ! -s "${NOTES_FILE}" ]]; then
            echo "::warning::no CHANGELOG section found for ${VERSION}, using stub"
            echo "Release ${VERSION}. See CHANGELOG.md for details." > "${NOTES_FILE}"
          fi
          echo "path=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"
          echo "---- release notes ----"
          cat "${NOTES_FILE}"
          echo "-----------------------"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          BRAND_CODE="$(grep 'appCodeName = "' QuotaMonitor/Core/Branding.swift \
            | sed 's/.*= "//;s/".*//')"
          if [[ -z "${BRAND_CODE}" ]]; then
            echo "error: could not extract branding" >&2; exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "dist/${BRAND_CODE}-${VERSION}.dmg" \
            "dist/${BRAND_CODE}-${VERSION}.dmg.sha256" \
            --title "${BRAND_CODE} ${VERSION}" \
            --notes-file "${{ steps.notes.outputs.path }}"

  # ── CodexMonitor (codex-monitor repo) ─────────────────────────────
  release-codex-monitor:
    needs: test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Switch branding to CodexMonitor
        run: |
          sed -i '' 's/appDisplayName = ".*"/appDisplayName = "CodexMonitor"/' \
            QuotaMonitor/Core/Branding.swift
          sed -i '' 's/appCodeName = ".*"/appCodeName = "CodexMonitor"/' \
            QuotaMonitor/Core/Branding.swift
          # Repoint the Sparkle feed at the codex-monitor appcast. This build
          # publishes its DMG to systemoutprintlnnnn/codex-monitor, so the
          # shipped app must poll THAT repo's appcast.xml. Left unchanged, a
          # CodexMonitor install would check Quota Monitor's feed and either
          # miss CodexMonitor updates or be offered the wrong branded DMG.
          # (build.sh copies Resources/Info.plist verbatim apart from version
          # and brand-name injection, so editing it here flows into the build.)
          sed -i '' \
            's#systemoutprintlnnnn/quota-monitor/main/appcast.xml#systemoutprintlnnnn/codex-monitor/main/appcast.xml#' \
            Resources/Info.plist
          echo "==> Branding after switch:"
          grep -E 'app(DisplayName|CodeName)' QuotaMonitor/Core/Branding.swift
          echo "==> Sparkle feed after switch:"
          grep -A1 SUFeedURL Resources/Info.plist

      - name: Run release pipeline
        run: ./tools/release.sh

      - name: Extract CHANGELOG section for this release
        id: notes
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          NOTES_FILE="$(mktemp -t release-notes)"
          awk -v hdr="## [${VERSION}] " '
            substr($0, 1, length(hdr)) == hdr { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "${NOTES_FILE}"
          if [[ ! -s "${NOTES_FILE}" ]]; then
            echo "::warning::no CHANGELOG section found for ${VERSION}, using stub"
            echo "Release ${VERSION}. See CHANGELOG.md for details." > "${NOTES_FILE}"
          fi
          echo "path=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release on codex-monitor repo
        env:
          GH_TOKEN: ${{ secrets.CODEX_MONITOR_PAT }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          DMG="dist/CodexMonitor-${VERSION}.dmg"
          SHA="${DMG}.sha256"
          if [[ ! -f "${DMG}" ]]; then
            echo "error: ${DMG} not found" >&2; exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "${DMG}" "${SHA}" \
            --repo systemoutprintlnnnn/codex-monitor \
            --title "CodexMonitor ${VERSION}" \
            --notes-file "${{ steps.notes.outputs.path }}"

      - name: Sign published DMG + build appcast entry
        # Sign the EXACT DMG just uploaded to the release (the same
        # dist/ file), so the appcast signature always matches the bytes
        # Sparkle downloads. This is the whole point of signing in CI:
        # the old flow signed a locally-built DMG that differed byte-for
        # -byte from the CI-built one, so Sparkle rejected every update
        # as "improperly signed".
        #
        # Fail-safe: if SPARKLE_PRIVATE_KEY isn't configured we warn and
        # skip — a missing secret must never block the release upload
        # that already succeeded above.
        id: appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_PRIVATE_KEY}" ]]; then
            echo "::warning::SPARKLE_PRIVATE_KEY not set — skipping appcast signing. Add the repo secret to auto-publish updates (see docs/release.md)."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # Guard: the secret must be the key whose public half is
          # embedded as SUPublicEDKey. A mis-pasted or rotated secret
          # would otherwise produce an appcast Sparkle rejects as
          # "improperly signed" — fail the release here instead of
          # shipping it.
          ./tools/verify-signing-key.sh
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          # release-sparkle.sh signs dist/QuotaMonitor-<VERSION>.dmg with
          # SPARKLE_PRIVATE_KEY (no Keychain on the runner) and writes the
          # ready-to-splice block to dist/appcast-item-<VERSION>.xml.
          ./tools/release-sparkle.sh "dist/QuotaMonitor-${VERSION}.dmg"
          {
            echo "### Appcast entry for ${VERSION}"
            echo '```xml'
            cat "dist/appcast-item-${VERSION}.xml"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "skip=false" >> "${GITHUB_OUTPUT}"

      - name: Open appcast PR
        # The feed is served from main (raw.githubusercontent.com/.../main
        # /appcast.xml) and main is branch-protected, so CI can't push the
        # entry directly — it opens a PR for the maintainer to merge. That
        # keeps a human gate before every running client sees the update,
        # while the error-prone sign-the-right-bytes step is now done by
        # CI and can't be gotten wrong.
        if: ${{ steps.appcast.outputs.skip == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(tr -d '[:space:]' < Resources/VERSION)"
          ITEM_FILE="dist/appcast-item-${VERSION}.xml"   # gitignored; survives the branch switch
          BRANCH="appcast/v${VERSION}"
          git fetch origin main
          git switch -c "${BRANCH}" origin/main
          python3 tools/appcast-insert.py "${ITEM_FILE}" appcast.xml
          if git diff --quiet -- appcast.xml; then
            echo "appcast.xml already up to date for ${VERSION}; no PR needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "appcast: v${VERSION}"
          git push -u origin "${BRANCH}"
          gh pr create --base main --head "${BRANCH}" \
            --title "appcast: v${VERSION}" \
            --body "Auto-generated by \`release.yml\`. The \`sparkle:edSignature\` was computed over the exact DMG published to the **v${VERSION}** release, so it matches the bytes Sparkle downloads. Merge to let every running client see v${VERSION} on its next check."
