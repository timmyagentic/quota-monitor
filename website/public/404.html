<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#ffffff">
  <title data-i18n="notFoundMetaTitle">Page not found — Quota Monitor</title>
  <meta name="description" content="The requested Quota Monitor page could not be found." data-i18n-content="notFoundMetaDescription">
  <link rel="icon" href="/assets/app-icon.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="not-found">
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand-lockup">
        <img class="brand-icon" src="/assets/app-icon.png" width="48" height="48" alt="Quota Monitor app icon" data-i18n-alt="appIconAlt">
        <span class="brand-name" data-i18n="brand">Quota Monitor</span>
      </div>
      <div class="language-control" role="group" aria-label="Choose display language" data-i18n-aria-label="languageLabel">
        <button type="button" data-language="zh-Hans" aria-label="Switch to Simplified Chinese" data-i18n-aria-label="chooseChinese" aria-pressed="false">中</button>
        <span aria-hidden="true">/</span>
        <button type="button" data-language="en" aria-label="Switch to English" data-i18n-aria-label="chooseEnglish" aria-pressed="true">EN</button>
      </div>
    </div>
  </header>
  <main id="main-content" class="not-found">
    <div class="container not-found-content">
      <h1 data-i18n="notFoundTitle">Page not found</h1>
      <p data-i18n="notFoundDescription">The page you requested does not exist or may have moved.</p>
      <a class="button button-primary" href="/" data-i18n="backHome">Back to Quota Monitor</a>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container footer-layout">
      <span data-i18n="license">MIT License</span>
      <span data-i18n="copyright">© 2026 Quota Monitor</span>
    </div>
  </footer>
  <script type="module" src="/app.js"></script>
</body>
</html>
